Redirecting…
<script>
(function(){
  var p = new URLSearchParams(window.location.search);
  var ref = p.get('ref');
  if (ref) { try { localStorage.setItem('referral_code', ref); } catch(e){} }
  var q = '?route=join' + (ref ? ('&ref=' + encodeURIComponent(ref)) : '');
  window.location.replace('/' + q);
})();
</script>
</body>
</html>
